version: "3.9"

services:

  # -------------------------------------------------------
  # Flask App
  # -------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: devops-lab-app
    ports:
      - "5001:5000"
    environment:
      - ENVIRONMENT=development
      - APP_VERSION=1.0.0
      - PORT=5000
      - APP_SECRET_KEY=local-dev-secret-change-in-prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # -------------------------------------------------------
  # Prometheus — scrapes /metrics from the app every 15s
  # -------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: devops-lab-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    depends_on:
      - app
    restart: unless-stopped

  # -------------------------------------------------------
  # Grafana — visualises Prometheus metrics as dashboards
  # -------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.0
    container_name: devops-lab-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin   # login: admin / admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./monitoring/grafana/dashboard.json:/etc/grafana/provisioning/dashboards/dashboard.json
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  grafana-storage:    # persists Grafana data between restarts
