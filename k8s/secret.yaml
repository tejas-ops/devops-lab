apiVersion: v1
kind: Secret
metadata:
  name: devops-lab-secret
  namespace: devops-lab
type: Opaque

# IMPORTANT: Never commit real values here.
# These are base64-encoded placeholders.
# To encode a value:  echo -n "myvalue" | base64
# To decode a value:  echo "bXl2YWx1ZQ==" | base64 -d
#
# In production, use Azure KeyVault with the Secrets Store CSI driver
# (we wire this up in Phase 7)

data:
  APP_SECRET_KEY: Y2hhbmdlbWVpbnByb2Q=    # "changemeInprod"
