apiVersion: v1
kind: ServiceAccount
metadata:
  name: devops-lab-sa
  namespace: devops-lab
  # When using Azure KeyVault with Workload Identity (Phase 7 advanced),
  # add this annotation with your Azure managed identity client ID:
  # annotations:
  #   azure.workload.identity/client-id: "YOUR_MANAGED_IDENTITY_CLIENT_ID"
---
# Role: defines WHAT the service account is allowed to do
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: devops-lab-role
  namespace: devops-lab
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list"]          # read-only — pods can read secrets, not create/delete them
---
# RoleBinding: grants the Role to the ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: devops-lab-rolebinding
  namespace: devops-lab
subjects:
  - kind: ServiceAccount
    name: devops-lab-sa
    namespace: devops-lab
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: devops-lab-role
