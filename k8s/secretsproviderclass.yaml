# SecretProviderClass — Azure KeyVault CSI Driver integration
#
# This is used when running on AKS with the Secrets Store CSI Driver installed.
# It tells K8s: "mount these secrets from Azure KeyVault into the pod as files or env vars"
#
# Prerequisites (run once on AKS):
#   az aks enable-addons --addons azure-keyvault-secrets-provider \
#     --name devops-lab-aks --resource-group devops-lab-rg
#
# This file is commented out for local kind use.
# Uncomment and fill in your Azure values when deploying to AKS.

