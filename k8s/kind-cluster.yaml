# kind (Kubernetes IN Docker) — local cluster config
# This creates a 1 control-plane + 2 worker node cluster on your laptop
#
# Install kind:  brew install kind
# Install kubectl: brew install kubectl
# Create cluster:  kind create cluster --config k8s/kind-cluster.yaml --name devops-lab

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

nodes:
  - role: control-plane
    # Expose port 80 and 443 on your localhost so the ingress controller works
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP

  - role: worker
  - role: worker
